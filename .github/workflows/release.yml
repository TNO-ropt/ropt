name: Release to PyPI

on:
  push:
    tags:
        - 'v0.[0-9]+.[0-9]+'

jobs:
  deploy-to-pypi:
    runs-on: ubuntu-latest
    environment:
        name: deploy-to-pypi
        url: https://pypi.org/project/ropt/
    permissions:
        id-token: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        ref: ${{ github.ref_name}}
    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
      with:
        python-version: "3.12"
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"
    - name: Build and deploy
      run: uv build
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1

  deploy-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        ref: ${{ github.ref_name}}
    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
      with:
        python-version: "3.12"
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"
    - name: Initialize deployment
      id: docs
      run: |
        uv sync --all-extras --dev
        echo "MAJOR=$(uv run python -c 'from ropt import version; print(version.version_tuple[0])')" >> $GITHUB_OUTPUT
        echo "MINOR=$(uv run python -c 'from ropt import version; print(version.version_tuple[1])')" >> $GITHUB_OUTPUT
    - name: Deploy
      env:
        MAJOR: ${{ steps.docs.outputs.MAJOR }}
        MINOR: ${{ steps.docs.outputs.MINOR }}
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git fetch origin gh-pages --depth=1
        uv run mike deploy $MAJOR.$MINOR latest --update-aliases --push
