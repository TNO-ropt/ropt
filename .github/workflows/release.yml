name: Release to PyPI

on:
  push:
    tags:
        - 'v0.[0-9]+.[0-9]+'

jobs:
  deploy-to-pypi:
    runs-on: ubuntu-latest
    environment:
        name: deploy-to-pypi
        url: https://pypi.org/project/ropt/
    permissions:
        id-token: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        ref: ${{ github.ref_name}}
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.12"
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"
    - name: Build and deploy
      run: uv build
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e

  deploy-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        ref: ${{ github.ref_name}}
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: "3.12"
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"
    - name: Initialize deployment
      id: docs
      run: |
        uv sync --all-extras --dev
        echo "MAJOR=$(uv run python -c 'from ropt import version; print(version.version_tuple[0])')" >> $GITHUB_OUTPUT
        echo "MINOR=$(uv run python -c 'from ropt import version; print(version.version_tuple[1])')" >> $GITHUB_OUTPUT
    - name: Deploy
      env:
        MAJOR: ${{ steps.docs.outputs.MAJOR }}
        MINOR: ${{ steps.docs.outputs.MINOR }}
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git fetch origin gh-pages --depth=1
        uv run mike deploy $MAJOR.$MINOR latest --update-aliases --push
